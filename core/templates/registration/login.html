{% extends "core/base.html" %}

{% block content %}

<div class="login-container">

    <div class="login-card">

        <h1>Bellamy & Sons</h1>

        <p>Workflow Management System</p>

        <form method="post">

            {% csrf_token %}

            <div class="form-group">

                <label>Username</label>

                <input
                    type="text"
                    name="username"
                    class="form-input"
                >

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    name="password"
                    class="form-input"
                >

            </div>

            {% if form.errors %}
                <p class="error">
                    Incorrect username or password.
                </p>
            {% endif %}

            <button
                class="gold-btn"
                type="submit">

                Sign In

            </button>

        </form>

    </div>

</div>

{% endblock %}
