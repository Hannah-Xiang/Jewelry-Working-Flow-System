{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Bellamy & Sons</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:#FCFAF5;

        }

        .login-wrapper{

            width:100%;
            max-width:700px;

            padding:40px;

        }

        /* Logo */

        .logo{

            display:flex;

            align-items:center;

            justify-content:center;

            gap:20px;

            margin-bottom:70px;

        }

        .logo-icon{

            width:72px;
            height:72px;

            border-radius:50%;

            background:#171411;

            display:flex;

            justify-content:center;

            align-items:center;

            color:#D4AF37;

            font-size:34px;

        }

        .logo-text h1{

            font-family:"Cormorant Garamond",serif;

            font-size:48px;

            font-weight:700;

            color:#1d1d1d;

            line-height:1;

        }

        .logo-text p{

            margin-top:6px;

            color:#C8A03A;

            letter-spacing:3px;

            font-size:24px;

        }

        /* Welcome */

        .welcome{

            color:#C8A03A;

            letter-spacing:3px;

            font-size:18px;

            margin-bottom:20px;

        }

        h2{

            font-family:"Cormorant Garamond",serif;

            font-size:55px;

            color:#222;

            margin-bottom:15px;

        }

        .subtitle{

            font-size:24px;

            color:#666;

            margin-bottom:55px;

        }

        /* Form */

        .form-group{

            margin-bottom:28px;

        }

        label{

            display:block;

            margin-bottom:12px;

            font-size:18px;

            font-weight:600;

        }

        input{

            width:100%;

            height:70px;

            border:2px solid #D4AF37;

            border-radius:18px;

            padding:0 24px;

            font-size:22px;

            background:white;

            outline:none;

        }

        input:focus{

            border-color:#B88D1E;

        }

        .error{

            color:#d93025;

            margin-bottom:20px;

        }

        button{

            width:100%;

            height:72px;

            margin-top:20px;

            border:none;

            border-radius:18px;

            background:#D4AF4A;

            color:#111;

            font-size:24px;

            font-weight:600;

            cursor:pointer;

            transition:.25s;

        }

        button:hover{

            background:#c79f34;

        }

    </style>

</head>

<body>

<div class="login-wrapper">

    <div class="logo">

        <div >
            <img src="{% static 'images/logo.png' %}" alt="Logo">
        </div>


    </div>
    <!-- <div class="logo">
        <div class="logo-text">

            <h1>Bellamy &amp; Sons</h1>

            <p>JEWELERS</p>

        </div>
    </div> -->

    <!-- <div class="welcome">

        WELCOME BACK

    </div> -->

    <h2>Sign In</h2>

    <p class="subtitle">

        Enter your credentials to access the store system.

    </p>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                placeholder="e.g. marie"
                required>

        </div>

        <div class="form-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                placeholder="••••••••"
                required>

        </div>

        {% if form.errors %}

            <p class="error">

                Incorrect username or password.

            </p>

        {% endif %}

        <button type="submit">

            Sign In

        </button>
        <div class="forgot-password">
    <a href="{% url 'password_reset' %}">
        Forgot your password?
    </a>
</div>

    </form>

</div>

</body>

</html>
<style>
    .forgot-password{

    margin-top:20px;

    text-align:center;

}

.forgot-password a{

    color:#8b8b8b;

    text-decoration:none;

    font-size:16px;

    transition:.25s;

}

.forgot-password a:hover{

    color:#C8A03A;

    text-decoration:underline;

}
</style>
