{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Password Updated | Bellamy &amp; Sons</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#FCFAF5;
        }

        .login-wrapper{
            width:100%;
            max-width:700px;
            padding:40px;
        }

        .logo{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:20px;
            margin-bottom:70px;
        }

        .logo-icon{
            width:72px;
            height:72px;
            border-radius:50%;
            background:#171411;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#D4AF37;
            font-size:34px;
        }

        .logo-text h1{
            font-family:"Cormorant Garamond",serif;
            font-size:48px;
            font-weight:700;
            color:#1d1d1d;
            line-height:1;
        }

        .logo-text p{
            margin-top:6px;
            color:#C8A03A;
            letter-spacing:3px;
            font-size:24px;
        }

        h2{
            font-family:"Cormorant Garamond",serif;
            font-size:55px;
            color:#222;
            margin-bottom:18px;
        }

        .subtitle{
            font-size:24px;
            color:#666;
            line-height:1.5;
            margin-bottom:45px;
        }

        .success{
            background:#EAF8EF;
            border:1px solid #BFE3CB;
            color:#237B45;
            border-radius:16px;
            padding:24px;
            line-height:1.7;
            font-size:19px;
            margin-bottom:40px;
        }

        .login-btn{
            display:block;
            width:100%;
            height:72px;
            line-height:72px;
            text-align:center;
            border-radius:18px;
            background:#D4AF4A;
            color:#111;
            text-decoration:none;
            font-size:24px;
            font-weight:600;
            transition:.25s;
        }

        .login-btn:hover{
            background:#C79F34;
        }

    </style>

</head>

<body>

<div class="login-wrapper">

    <div class="logo">

        <div >
            <img src="{% static 'images/logo.png' %}" alt="Logo">
        </div>


    </div>

    <h2>Password Updated</h2>

    <p class="subtitle">
        Your password has been successfully changed.
    </p>

    <div class="success">

        ✔ Your account password has been updated successfully.<br><br>

        You can now sign in using your new password.

    </div>

    <a href="{% url 'login' %}" class="login-btn">
        Return to Sign In
    </a>

</div>

</body>
</html>
